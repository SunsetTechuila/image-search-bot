name: Deploy Server

on:
  push:
    branches:
      - master
    paths:
      - packages/image-search-server/src/**
      - packages/image-search-server/package.json

jobs:
  check-credentials:
    name: Check credentials
    runs-on: ubuntu-latest
    environment: production
    outputs:
      is_set: ${{ steps.check.outputs.is_set }}
    steps:
      - name: Check credentials
        id: check
        run: |
          if [[ '${{ secrets.SSH_KEY }}' && '${{ secrets.SSH_HOST }}' && '${{ secrets.SSH_USERNAME }}' && \
                '${{ secrets.DOCKER_REGISTRY_URL }}' && '${{ secrets.DOCKER_REGISTRY_USERNAME }}' && '${{ secrets.DOCKER_REGISTRY_PASSWORD }}' ]]; then
            echo "is_set=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_set=false" >> "$GITHUB_OUTPUT"
            echo "Required credentials are not set. Skipping deployment."
          fi

  check-package:
    name: Check package
    needs: check-credentials
    if: ${{ needs.check-credentials.outputs.is_set == 'true' }}
    uses: ./.github/workflows/check.yml
    secrets: inherit
    with:
      cwd: packages/image-search-server

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: check-package
    environment: production
    steps:
      - name: Checkout repo
        uses: actions/checkout@cbb722410c2e876e24abbe8de2cc27693e501dcb

      - name: Login to Docker Registry
        uses: docker/login-action@7ca345011ac4304463197fac0e56eab1bc7e6af0
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@11be14d908760a0756f045980728ec5fb7880f74
        with:
          context: packages/image-search-server
          push: true
          tags: ${{ secrets.DOCKER_REGISTRY_URL }}/image-search-server:latest

  deploy:
    name: Deploy server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo '${{ secrets.SSH_KEY }}' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo 'StrictHostKeyChecking no' >> ~/.ssh/config

      - name: Deploy
        uses: appleboy/ssh-action@66aa4d343bf909ac4fa0ac52f4e62a9adc354c95
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Login to registry
            echo '${{ secrets.DOCKER_REGISTRY_PASSWORD }}' | docker login ${{ secrets.DOCKER_REGISTRY_URL }} -u ${{ secrets.DOCKER_REGISTRY_USERNAME }} --password-stdin

            # Pull new image
            docker pull ${{ secrets.DOCKER_REGISTRY_URL }}/image-search-server:latest

            # Stop and remove old container
            docker stop image-search-server || true
            docker rm image-search-server || true

            # Run new container
            docker run -d \
              --name image-search-server \
              --restart unless-stopped \
              ${{ secrets.DOCKER_REGISTRY_URL }}/image-search-server:latest
